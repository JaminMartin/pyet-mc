name: Test

on:
  push:
    branches:
      - main
      - master
      - pyet-devel
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: macos-14
            target: aarch64
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies and build Rust extension
        run: uv sync

      - name: Verify Rust extension is available
        run: |
          uv run python -c "from pyet_mc._pyet_mc import general_energy_transfer, general_energy_transfer_para; print('Rust extension loaded successfully')"

      - name: Run tests
        run: |
          uv run pytest tests/ -v --tb=short
